<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Grid</title>
    <style>
        * {
            text-align: center;
        }

        .body {
            background-color: black;
        }

        .cont {
            border: 2px solid black;
            border-radius: 20px;
            margin: auto;
            width: 400px;
            height: 500px;
            padding: 20px;
            background-color: lightgray;
            display: grid;
            gap: 10px;
            grid-template-areas:
                " blank blank blank blank"
                " one two three add"
                " four five six subtract"
                " seven eight nine multiply"
                " clear zero equals divide"
        }

        .cont>div {
            display: flex;
            align-items: center;
            justify-content: center;
            ;
            font-size: 24px;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        }

        #display {
            background-color: white;
            grid-area: blank;
            /* border: 2px solid black; */
            border-radius: 20px;
            padding: 10px;     
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);   
            }

        #one {
            background-color: white;
            grid-area: one;
            color: black;
        }

        #two {
            background-color: white;
            grid-area: two;
            color: black;
        }

        #three {
            background-color: white;
            grid-area: three;
            color: black;
        }

        #four {
            background-color: white;
            grid-area: four;
            color: black;
        }

        #five {
            background-color: white;
            grid-area: five;
            color: black;
        }

        #six {
            background-color: white;
            grid-area: six;
            color: black;
        }

        #seven {
            background-color: white;
            grid-area: seven;
            color: black;
        }

        #eight {
            background-color: white;
            grid-area: eight;
            color: black;
        }

        #nine {
            background-color: white;
            grid-area: nine;
            color: black;
        }

        #zero {
            background-color: white;
            grid-area: zero;
            color: black;
        }

        #add {
            grid-area: add;
            background-color: Black;
            color: white;
        }

        #subtract {
            grid-area: subtract;
            background-color: Black;
            color: white;
        }

        #multiply {
            grid-area: multiply;
            background-color: Black;
            color: white;
        }

        #divide {
            grid-area: divide;
            background-color: Black;
            color: white;
        }

        #equals {
            grid-area: equals;
            background-color: Black;
            color: white;
        }

        #clear {
            grid-area: clear;
            background-color: red;
            color: white;
        }
        .cont>div:hover {
            background-color: lightblue;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1 class="h1">Calculator Grid</h1>
    <div class="cont">
        <input type="text" id="display" disabled>
        <div id="one">1</div>
        <div id="two">2</div>
        <div id="three">3</div>
        <div id="four">4</div>
        <div id="five">5</div>
        <div id="six">6</div>
        <div id="seven">7</div>
        <div id="eight">8</div>
        <div id="nine">9</div>
        <div id="zero">0</div>
        <div id="add">+</div>
        <div id="subtract">-</div>
        <div id="multiply">*</div>
        <div id="divide">/</div>
        <div id="equals">=</div>
        <div id="clear">C</div>
</body>

</html>
