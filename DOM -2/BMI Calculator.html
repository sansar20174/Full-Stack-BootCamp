<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: auto;
            Text-align: center;

        }

        h1 {
            color: #2b2b9e;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #87CEFA;

        }

        div.container {
            max-width: 400px;
            margin: auto;
            padding: 80px;
            border: 8px solid #ffffffa5;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background-color: #1E90FF;
            border-radius: 7%;

        }

        label {
            display: inline-block;
            width: 100px;
        }

        input {
            margin-bottom: 10px;
            background-color: #4169E1;
        }

        button {
            margin-top: 10px;
            background-color: #00008B;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;

        }
    </style>
</head>

<body>
    <div class="container">
        <h1>BMI Calculator</h1><br><br>
        <h3></h3>Enter your weight and height to calculate your BMI</h3><br><br>
        <label for="weight">Weight (kg):</label>
        <input type="number" id="weight" name="weight"><br><br>

        <label for="height">Height (cm):</label>
        <input type="number" id="height" name="height"><br><br>

        <button onclick="calculateBMI()">Calculate BMI</button><br><br>
        <p id="result"></p>
    </div>
</body>

</html>

<script>
    function calculateBMI() {
        const weight = document.getElementById('weight').value;
        const height = document.getElementById('height').value;

        if (weight <= 0 || height <= 0) {
            document.getElementById('result').textContent = "Please enter valid weight and height.";
            return;
        }

        let bmi = weight / ((height / 100) ** 2);
        let category = '';

        if (bmi < 18.5) {
            category = 'Underweight';
        } else if (bmi >= 18.5 && bmi < 24.9) {
            category = 'Normal weight';
        } else if (bmi >= 25 && bmi < 29.9) {
            category = 'Overweight';
        } else {
            category = 'Obesity';
        }
        document.getElementById('result').textContent = `Your BMI is ${bmi.toFixed(2)} (${category}).`;
    }
</script>
