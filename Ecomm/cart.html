<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naptol</title>

    <style>
        * {
            box-sizing: border-box;
            text-align: center;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: #1f2937;
            background: linear-gradient(135deg, #f7f8fc 0%, #e8f4ff 100%);
            padding: 32px 20px 48px;
        }

        h1 {
            margin: 0 0 18px;
        }

        #total {
            display: inline-block;
            margin: 12px 0 28px;
            padding: 12px 20px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
        }

        #backBtn {
            background: #111827;
            color: #ffffff;
            border-radius: 999px;
        }

        #backBtn:hover {
            background: #2563eb;
        }

        #root {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            max-width: 1280px;
            margin: 0 auto;
        }

        #root>div {
            padding: 14px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 18px;
            box-shadow: 0 14px 35px rgba(15, 23, 42, 0.12);
            backdrop-filter: blur(6px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #root>div:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.16);
        }

        img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 14px;
            background: #fff;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 999px;
            background: #2c8bb3;
            color: #ffffff;
            font-size: 15px;
            margin: 8px 6px;
            box-shadow: 0 8px 18px rgba(44, 139, 179, 0.25);
        }

        button:hover {
            background: #1d6f91;
            cursor: pointer;
        }

        span {
            color: #e11d48;
            font-weight: 700;
        }

        hr {
            border: 0;
            height: 1px;
            background: rgba(148, 163, 184, 0.35);
            margin: 14px 0;
        }

        @media (max-width: 640px) {
            body {
                padding: 20px 12px 36px;
            }

            img {
                height: 240px;
            }
        }
    </style>
</head>

<body>
    <h1>Welcome to Naptol Cart Page</h1>

    <button id="backBtn">Back to Products</button>
    
    <h1 id="total">Total cart value: </h1>

    <div id="root">
        <!-- All Product come here... -->
    </div>
</body>

</html>

<script>

    let cartArr = JSON.parse(localStorage.getItem("cart")) || [];

    displayCart(cartArr)

    const totalCartValue = cartArr.reduce((acc, el) => {
        return acc + el.price
    }, 0)

    console.log(totalCartValue);
    document.querySelector("#total").innerText = `Total cart value: ${totalCartValue} `


    function displayCart(arr) {

        document.querySelector("#root").innerText = ""
        arr.forEach((el, i) => {

            const box = document.createElement("div");

            const image = document.createElement("img");
            image.setAttribute("src", el.image);

            const title = document.createElement("h3");
            title.innerHTML = `<span>Title:</span> ${el.title}`

            const category = document.createElement("h3");
            category.innerText = `Category: ${el.category}`

            const description = document.createElement("p");
            description.innerText = `Description: ${el.description}`

            const price = document.createElement("button");
            price.innerText = `Price: ${el.price}`

            const rating = document.createElement("button");
            rating.innerText = `Rating: ${el.rating.rate}`

            const hrr = document.createElement("hr");

            const removebtn = document.createElement("button");
            removebtn.innerText = "Remove"

            removebtn.addEventListener("click", function () {
                cartArr.splice(i, 1)

                localStorage.setItem("cart", JSON.stringify(cartArr));
                alert("Product Removed from cart")
                displayCart(cartArr)
                const totalCartValue = cartArr.reduce((acc, el) => {
                    return acc + el.price
                }, 0)

                console.log(totalCartValue);
                document.querySelector("#total").innerText = `Total cart value: ${totalCartValue} `



            })

            box.append(image, title, category, description, price, rating, hrr, removebtn);

            document.querySelector("#root").append(box)
        })
    }

    document.querySelector("#backBtn").addEventListener("click", function () {
        window.location.href = "index.html";
    })
</script>
