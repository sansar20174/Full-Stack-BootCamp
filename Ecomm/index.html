<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naptol</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            box-sizing: border-box;
            text-align: center;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 32px 20px 48px;
            font-family: Arial, Helvetica, sans-serif;
            color: #1f2937;
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(16, 185, 129, 0.14), transparent 24%),
                linear-gradient(135deg, #f8fafc 0%, #eef6ff 100%);
        }

        h1 {
            margin: 0 0 18px;
            font-size: clamp(2rem, 4vw, 3rem);
            letter-spacing: -0.03em;
        }

        input,
        select,
        button {
            font: inherit;
        }

        input,
        select {
            margin: 8px 8px 20px;
            padding: 12px 16px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.9);
            color: #111827;
            outline: none;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }

        input {
            min-width: min(92vw, 340px);
        }

        input:focus,
        select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
        }

        #cartBtn {
            background: linear-gradient(135deg, #111827, #2563eb);
            color: #ffffff;
            border-radius: 999px;
            padding-inline: 18px;
            box-shadow: 0 12px 28px rgba(37, 99, 235, 0.22);
        }

        #cartBtn:hover {
            background: linear-gradient(135deg, #0f172a, #1d4ed8);
        }

        #root {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            max-width: 1300px;
            margin: 28px auto 0;
        }

        #root>div {
            padding: 14px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 14px 35px rgba(15, 23, 42, 0.12);
            backdrop-filter: blur(6px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #root>div:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.16);
        }

        img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 14px;
            background: #fff;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 999px;
            background: #2c8bb3;
            color: #ffffff;
            font-size: 15px;
            margin: 8px 6px;
            box-shadow: 0 8px 18px rgba(44, 139, 179, 0.22);
        }

        button:hover {
            background: #1d6f91;
            cursor: pointer;
        }

        hr {
            border: 0;
            height: 1px;
            background: rgba(148, 163, 184, 0.35);
            margin: 14px 0;
        }

        @media (max-width: 640px) {
            body {
                padding: 20px 12px 36px;
            }

            input,
            select {
                width: 100%;
                margin-left: 0;
                margin-right: 0;
            }

            img {
                height: 240px;
            }
        }
    </style>
</head>

<body>
    <h1>Welcome to Naptol Product Page</h1>

    <input type="text" id="search" placeholder="search Product ..." oninput="search()">

    <select id="sort" onchange="sort()">
        <option value="asc">asc</option>
        <option value="dsc">dsc</option>
    </select>

    <button id="cartBtn">Go to Cart</button>

    <div id="root">
        <!-- All Product come here... -->
    </div>
</body>

</html>

<script>

    let bag = []
    let cartArr = JSON.parse(localStorage.getItem("cart")) || []
    const api = "https://fakestoreapi.com/products";

    fetch(api)
        .then((res) => res.json())
        .then((data) => {
            console.log(data)
            bag = data
            displayCart(data);
        }
        ).catch((err) => console.log(err)
        )


    function displayCart(arr) {
        document.querySelector("#root").innerText = ""
        arr.forEach((el) => {

            const box = document.createElement("div");

            const image = document.createElement("img");
            image.setAttribute("src", el.image);

            const title = document.createElement("h3");
            title.innerText = `Title: ${el.title}`

            const category = document.createElement("h3");
            category.innerText = `Category: ${el.category}`

            const description = document.createElement("p");
            description.innerText = `Description: ${el.description}`

            const price = document.createElement("button");
            price.innerText = `Price: ${el.price}`

            const rating = document.createElement("button");
            rating.innerText = `Rating: ${el.rating.rate}`

            const hrr = document.createElement("hr");

            const cart = document.createElement("button");
            cart.innerText = "Add to Cart"

            cart.addEventListener("click", function () {
                cartArr.push(el);

                localStorage.setItem("cart", JSON.stringify(cartArr));
                // alert("Product added to cart")
                Swal.fire({
                    title: "Good job!",
                    text: "Product added to cart",
                    icon: "success"
                });
            })

            box.append(image, title, category, description, price, rating, hrr, cart);

            document.querySelector("#root").append(box)
        })
    }

    function search() {
        console.log(bag);

        const query = document.querySelector("#search").value

        const filterData = bag.filter((el) => {
            return el.category.toLowerCase().includes(query.toLowerCase())
        });

        console.log(filterData);

        displayCart(filterData)


    }


    function sort() {
        const query = document.querySelector("#sort").value

        if (query == "asc") {
            const ans = bag.sort((a, b) => a.price - b.price);
            displayCart(ans)
        } else {
            const ans = bag.sort((b, a) => a.price - b.price);
            displayCart(ans)
        }

    }

    document.querySelector("#cartBtn").addEventListener("click", function () {
        window.location.href = "cart.html";
    })
</script>
