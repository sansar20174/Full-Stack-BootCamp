<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Grid</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #ffffff;
        }

        .calculator-wrap {
            width: 400px;
        }

        .title {
            margin-bottom: 18px;
        }

        .cont {
            border: 2px solid black;
            border-radius: 20px;
            padding: 20px;
            background-color: lightgray;
            display: grid;
            gap: 10px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .key,
        #display {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        }

        #display {
            background-color: white;
            padding: 10px;
            width: 100%;
            height: 86px;
            border: 0;
        }

        .key {
            height: 76px;
            cursor: pointer;
        }

        .num {
            background: white;
            color: black;
        }

        .op,
        .equal {
            background: black;
            color: white;
        }

        .clear {
            background: red;
            color: white;
        }

        .key:hover {
            background-color: lightblue;
        }
    </style>
</head>

<body>
    <main class="calculator-wrap">
        <h1 class="title">Calculator Grid</h1>

        <div class="cont">
            <input type="text" id="display" readonly>

            <div class="row">
                <div class="key num">1</div>
                <div class="key num">2</div>
                <div class="key num">3</div>
                <div class="key op">+</div>
            </div>

            <div class="row">
                <div class="key num">4</div>
                <div class="key num">5</div>
                <div class="key num">6</div>
                <div class="key op">-</div>
            </div>

            <div class="row">
                <div class="key num">7</div>
                <div class="key num">8</div>
                <div class="key num">9</div>
                <div class="key op">*</div>
            </div>

            <div class="row">
                <div class="key clear">C</div>
                <div class="key num">0</div>
                <div class="key equal">=</div>
                <div class="key op">/</div>
            </div>
        </div>
    </main>
</body>

</html>

<script>
    const keys = document.querySelectorAll(".cont>div")

    for (let i = 0; i<keys.length; i++){
        keys[i].addEventListener("click", myCal)
    }

    function myCal(e){
        let display = document.getElementById("display")
        let key = e.target.innerText

        if (key === "C"){
            display.value = ""
        } else if (key === "="){
            display.value = eval(display.value)
        } else {
            display.value += key
        }
    }


</script>
